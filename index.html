<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Photo Editor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI Photo Editor</h1>
<p>Upload your photo and remove background instantly</p>

<div class="box">

<input type="file" id="upload">

<br><br>

<button onclick="removeBg()">Remove Background</button>

<p id="loading"></p>

<div id="result">

<h3>Result Image</h3>

<img id="preview">

<br><br>

<a id="download" download="no-bg.png">
<button>Download Image</button>
</a>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
